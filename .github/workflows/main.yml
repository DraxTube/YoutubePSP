name: Build PSPTube

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pspdev/pspdev:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apk add --no-cache make git bash python3 zip || \
          apt-get update && apt-get install -y make git bash python3 zip || true

      - name: Verify PSPSDK
        run: |
          echo "PSPDEV = $PSPDEV"
          psp-gcc --version
          psp-config --pspsdk-path

      - name: Generate placeholder assets (if missing)
        run: |
          mkdir -p assets
          if [ ! -f assets/ICON0.PNG ]; then
            python3 - <<'PYEOF'
          import struct, zlib

          def png(w, h, color):
              def u32be(n): return struct.pack('>I', n)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr_data = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              ihdr = b'IHDR' + ihdr_data
              ihdr_chunk = u32be(len(ihdr_data)) + ihdr + u32be(zlib.crc32(ihdr) & 0xffffffff)
              raw = b''
              for y in range(h):
                  row = b'\x00'
                  for x in range(w):
                      row += bytes(color)
                  raw += row
              compressed = zlib.compress(raw)
              idat_chunk = u32be(len(compressed)) + b'IDAT' + compressed + \
                           u32be(zlib.crc32(b'IDAT' + compressed) & 0xffffffff)
              iend_chunk = u32be(0) + b'IEND' + u32be(zlib.crc32(b'IEND') & 0xffffffff)
              return sig + ihdr_chunk + idat_chunk + iend_chunk

          with open('assets/ICON0.PNG','wb') as f: f.write(png(144,80,[30,30,60]))
          with open('assets/PIC1.PNG', 'wb') as f: f.write(png(480,272,[20,20,40]))
          PYEOF
          fi

      - name: Build EBOOT.PBP
        run: |
          export PSPDEV=/usr/local/pspdev
          export PATH=$PATH:$PSPDEV/bin
          make clean
          make -j$(nproc)

      - name: Check build output
        run: |
          ls -lh EBOOT.PBP PSPTube.elf || true

      - name: Package release
        run: |
          mkdir -p release/PSP/GAME/PSPTube
          cp EBOOT.PBP release/PSP/GAME/PSPTube/
          cp README.md release/PSP/GAME/PSPTube/ 2>/dev/null || true
          cat > release/PSP/GAME/PSPTube/config.txt <<EOF
          proxy_host=192.168.1.100
          proxy_port=8080
          wifi_config=1
          volume=80
          EOF
          cd release && zip -r ../PSPTube-release.zip .

      - name: Upload EBOOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: PSPTube-EBOOT
          path: EBOOT.PBP
          retention-days: 30

      - name: Upload release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: PSPTube-release
          path: PSPTube-release.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PSPTube-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PSPTube-release.zip
          generate_release_notes: true
